<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Radio body -->
  <rect x="8" y="28" width="48" height="28" rx="4" fill="#f0c040" opacity="0.15" stroke="#f0c040" stroke-width="2"/>
  <!-- Antenna -->
  <line x1="32" y1="28" x2="44" y2="8" stroke="#f0c040" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Speaker grille -->
  <circle cx="24" cy="42" r="8" stroke="#f0c040" stroke-width="1.5" fill="none"/>
  <circle cx="24" cy="42" r="4" fill="#f0c040" opacity="0.3"/>
  <!-- Buttons -->
  <rect x="38" y="36" width="10" height="4" rx="2" fill="#f0c040" opacity="0.7"/>
  <rect x="38" y="44" width="10" height="4" rx="2" fill="#f0c040" opacity="0.5"/>
  <!-- ON AIR dot -->
  <circle cx="52" cy="30" r="3" fill="#e03030"/>
</svg>
